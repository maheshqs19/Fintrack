<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FinTrack — Sign In</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #080d1a;
    --surface: rgba(255,255,255,0.04);
    --border:  rgba(255,255,255,0.08);
    --accent:  #7c6ef7;
    --accent2: #a78bfa;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --success: #34d399;
    --danger:  #f87171;
  }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 50% at 20% 30%, rgba(124,110,247,0.15) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 80% 70%, rgba(167,139,250,0.10) 0%, transparent 60%);
    pointer-events: none;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    backdrop-filter: blur(24px);
    border-radius: 24px;
    padding: 48px 40px;
    width: 100%;
    max-width: 380px;
    text-align: center;
    position: relative;
    animation: slideUp 0.5s ease;
  }

  @keyframes slideUp {
    from { opacity:0; transform: translateY(24px); }
    to   { opacity:1; transform: translateY(0); }
  }

  .logo {
    font-size: 2rem;
    margin-bottom: 6px;
  }

  h1 {
    font-size: 1.5rem;
    font-weight: 700;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
    background: linear-gradient(135deg, #e2e8f0, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  p.sub {
    color: var(--muted);
    font-size: 0.85rem;
    margin-bottom: 36px;
  }

  .field {
    position: relative;
    margin-bottom: 20px;
    text-align: left;
  }

  label {
    display: block;
    font-size: 0.75rem;
    font-weight: 600;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }

  input[type="password"] {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    font-size: 1.1rem;
    font-family: 'Sora', sans-serif;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    letter-spacing: 3px;
  }

  input[type="password"]:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,110,247,0.15);
  }

  button {
    width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    color: #fff;
    border: none;
    border-radius: 12px;
    padding: 15px;
    font-size: 1rem;
    font-family: 'Sora', sans-serif;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 8px;
  }

  button:hover  { opacity: 0.9; }
  button:active { transform: scale(0.98); }

  .error {
    color: var(--danger);
    font-size: 0.82rem;
    margin-top: 12px;
    display: none;
  }
</style>
</head>
<body>
<div class="card">
  <div class="logo">💎</div>
  <h1>FinTrack</h1>
  <p class="sub">Your personal finance hub</p>

  <div class="field">
    <label>Password</label>
    <input type="password" id="pwd" placeholder="••••••••" autofocus>
  </div>

  <button id="btn" onclick="login()">Sign In</button>
  <p class="error" id="err">Incorrect password. Try again.</p>
</div>

<script>
  document.getElementById('pwd').addEventListener('keydown', e => {
    if (e.key === 'Enter') login();
  });

  async function login() {
    const pwd = document.getElementById('pwd').value;
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    if (!pwd) return;

    btn.textContent = 'Signing in…';
    btn.disabled = true;
    err.style.display = 'none';

    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      if (res.ok) {
        window.location.href = '/';
      } else {
        err.style.display = 'block';
        btn.textContent = 'Sign In';
        btn.disabled = false;
        document.getElementById('pwd').value = '';
        document.getElementById('pwd').focus();
      }
    } catch {
      err.textContent = 'Connection error. Try again.';
      err.style.display = 'block';
      btn.textContent = 'Sign In';
      btn.disabled = false;
    }
  }
</script>
</body>
</html>
